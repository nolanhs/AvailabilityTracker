<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <title>Eagle Vision</title>
</head>

<body style="
  min-height: 100vh;
  background: linear-gradient(#f3e7c9 0%, #f3e7c9 25%, #e6d9f2 100%);
  background-attachment: fixed;
  background-repeat: no-repeat;
">


    <!-- Header / Navbar -->
    <div class="container d-flex flex justify-content-center align-items-center">

        <!-- Logo -->
        <a class="navbar-brand text-white" href="#">
            <img src="logo.svg" alt="EagleVision Logo" class="img-fluid" style="max-height: 200px;" />
        </a>

    </div>
    </nav>
    <div class="my-0"></div>
    <!-- Main Content -->
    <main class="container py-0">

        <label for="roomSearch" class="form-label visually-hidden">
            Search Rooms
        </label>

        <input type="text" class="form-control" placeholder="Search Rooms..." id="roomSearch" />

        <div class="mt-4">
            <label for="campus">Choose a location:</label>
            <select id="campus" name="campus">
                <option value="">-- Select --</option>
                <option value="AIEB">AIEB</option>
                <option value="Library">Library</option>
                <option value="LSC">LSC</option>
            </select>
        </div>

        <div style="max-width: 1100px; margin: 0 auto;">
            <div style="display: flex; gap: 24px; margin-top: 24px; justify-content: center; flex-wrap: wrap;">

                <!-- (cards omitted for brevity - same as original) -->

            </div>

            <h4 class="text-center mt-4">Live Traffic Tracker</h4>

            <div style="display: flex; gap: 24px; margin-top: 16px; justify-content: center; flex-wrap: wrap;">

                <!-- (live summary cards omitted) -->

                <iframe
                    src="https://cdn.maps.moderncampus.net/nucloudmap/index.html?map=619&layer=Academic,Administrative,Student%20Life&zoom=1"
                    width="100%" height="800" style="border: 1px solid black; border-radius: 12px;"></iframe>

            </div>

    </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Socket.IO client (served automatically by your server) -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // connect to the same origin where the page was served
        const socket = io();
        socket.on('connect', () => console.log('Socket connected', socket.id));
        socket.on('sensor-update', (data) => {
            console.log('sensor-update', data);
            loadRooms();
        });

        // fetch room occupancy and update cards
        async function loadRooms() {
            try {
                const resp = await fetch('/api/rooms/status');
                if (!resp.ok) throw new Error('rooms fetch failed');
                const rooms = await resp.json();
                rooms.forEach(r => {
                    const card = document.querySelector(`[data-room="${r.roomName}"]`);
                    if (!card) return;
                    const occupied = !!r.isOccupied;
                    card.style.backgroundColor = occupied ? 'lightcoral' : 'lightgreen';
                    let lbl = card.querySelector('.occupancy-label');
                    if (!lbl) {
                        lbl = document.createElement('div');
                        lbl.className = 'occupancy-label';
                        lbl.style.marginTop = '8px';
                        lbl.style.fontWeight = '700';
                        card.appendChild(lbl);
                    }
                    lbl.textContent = occupied ? 'OCCUPIED' : 'AVAILABLE';
                });
            } catch (err) {
                console.error('Failed to load rooms', err);
            }
        }

        // short helper to fetch latest API data (kept for debug)
        async function fetchLatest() {
            try {
                const resp = await fetch('/api/latest');
                if (!resp.ok) throw new Error('fetch failed');
                const json = await resp.json();
                console.log('api /api/latest ->', json);
            } catch (err) {
                console.error('Failed to fetch latest', err);
            }
        }
        fetchLatest();
        loadRooms();

        // existing UI filters
        const roomSearch = document.getElementById("roomSearch");
        const campusSelect = document.getElementById("campus");

        function applyFilters() {
            const query = roomSearch.value.toLowerCase().trim();
            const selectedCampus = campusSelect.value;

            document.querySelectorAll("[data-room]").forEach(card => {
                const roomName = card.dataset.room.toLowerCase();
                const building = card.dataset.building;

                const matchesSearch = roomName.includes(query);
                const matchesCampus =
                    selectedCampus === "" || building === selectedCampus;

                card.style.display = (matchesSearch && matchesCampus) ? "" : "none";
            });
        }

        roomSearch.addEventListener("input", applyFilters);
        campusSelect.addEventListener("change", applyFilters);
    </script>

</body>

</html>
