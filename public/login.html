<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(#bfae7a 0%, #bfae7a 33%, #7d6aa5 100%);
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card col-12 col-md-5">
            <div class="card-body">
                <h2 class="text-center">EagleVision Login</h2>
                <!-- Semmantic tagging for forms -->
                <form action="login.php" method="post" novalidate>
                    <label class="form-label" for="txtEmail">Email</label>
                    <input class="form-control" id="txtEmail" type="email" placeholder="username@tntech.edu">
                    <label class="form-label" for="txtPassword">Password</label>
                    <input class="form-control" id="txtPassword" type="password">
                    <input type="checkbox" onclick="myFunction()">Show Password

                    <script>
                        function myFunction() {
                            var x = document.getElementById("txtPassword");
                            if (x.type === "password") {
                                x.type = "text";
                            } else {
                                x.type = "password";
                            }
                        }
                    </script>
                    <hr />
                    <button id="btnLogin" class="btn btn-primary col-12 mt-2" type="button"
                        onclick="validate()">Login</button>
                    <script>
                        function validate() {
                            var username = document.getElementById("txtEmail").value;
                            var password = document.getElementById("txtPassword").value;
                            if (username == "admin" && password == "tempPass") {
                                alert("Login successfully");
                                window.location = "index.html";
                                return false;
                            } else {
                                alert("Enter a valid account");
                                return false;
                            }
                        }
                    </script>
                    <a href="register.html"><button id="btnRegister" class="btn btn-secondary col-12 mt-2"
                            type="button">Register</button></a>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
