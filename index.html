<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Character encoding -->
  <meta charset="UTF-8">

  <!-- Makes the page responsive on mobile devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap CSS  -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <title>Eagle Vision</title>
</head>

<body class="bg-light">
  <!--
    Main container
  -->
  <div class="container mt-4">

    <!--
      Flex container for header items
    -->
    <div class="d-flex flex-wrap justify-content-center align-items-center gap-3 p-3">

      <!--
        Logo wrapper
      -->
      <div class="pe-3">
        <img
          src="images/logo.png"
          alt="Eagle Vision Logo"
          width="100"
          height="80"
        >
      </div>

      <!--
        Button linking to Tennessee Tech website
      -->
      <a
        href="https://www.tntech.edu/"
        target="_blank"
        class="btn btn-outline-secondary"
      >
        Visit Tennessee Tech
      </a>

      <!--
        Campus map button
      -->
      <a
        href="https://www.tntech.edu/maps/index.php"
        target="_blank"
        class="btn btn-primary d-flex align-items-center gap-2"
      >
        <!-- Small icon inside the button -->
        <img
          src="images/map.png"
          alt=""
          width="24"
          height="24"
        >

        <!-- Button text -->
        <span>Campus Map</span>
      </a>

    </div>

    <!--
      Search input field
    -->
    <input
      type="text"
      class="form-control mt-4"
      placeholder="Search Rooms..."
    >

  </div>

  <!-- Bootstrap JavaScript  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
