<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <title>Eagle Vision</title>
</head>

<body class="bg-light" style="background-color:#eedbbd; min-height: 100vh;">

  <!-- Header / Navbar -->
  <nav class="navbar py-3"  style="background: linear-gradient(90deg, #194152, #2e525e, #50849a);"
>
    <div class="container d-flex flex-wrap justify-content-center justify-content-md-between align-items-center gap-3">

      <!-- Logo -->
      <a class="navbar-brand text-white" href="#">
        <img
          src="logo.svg"
          alt="EagleVision Logo"
          class="img-fluid"
          style="max-height: 160px;"
        />
      </a>

      <!-- Action Buttons -->
      <div class="d-flex gap-2">
        <a
          href="https://www.tntech.edu/"
          target="_blank"
          class="btn btn-outline-light"
        >
          Visit Tennessee Tech
        </a>

        <a
          href="https://www.tntech.edu/maps/index.php"
          target="_blank"
          class="btn btn-outline-light d-flex align-items-center gap-2"
        >
          <span>Campus Map</span>
        </a>
      </div>

    </div>
  </nav>

  <!-- Main Content -->
  <main class="container py-4">

    <label for="roomSearch" class="form-label visually-hidden">
      Search Rooms
    </label>

    <input
      type="text"
      id="roomSearch"
      class="form-control"
      placeholder="Search Rooms..."
    />

    <div style="display: flex; gap: 24px; margin-top: 24px; justify-content: center; flex-wrap: wrap;">

      <div style="
        border: 1px solid black;
        border-radius: 14px;
        width: 320px;
        background-color: whitesmoke;
        margin-top: 20px;
        padding: 18px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.08)
        ">
        <p><strong>AIEB 216</strong></p>
        <p style="color: green;">Status: Vacant</p>
      </div>

      <div style="
        border: 1px solid black;
        border-radius: 14px;
        width: 320px;
        background-color: whitesmoke;
        margin-top: 20px;
        padding: 18px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.08)
        ">
        <p><strong>AIEB 205</strong></p>
        <p style="color: red;">Status: Occupied</p>
      </div>

      <div style="
        border: 1px solid black;
        border-radius: 14px;
        width: 320px;
        background-color: whitesmoke;
        margin-top: 20px;
        padding: 18px;
        box-shadow: 0 6px 12px rgba(0,0,0,0.08)
        ">
        <p><strong>AIEB 237</strong></p>
        <p style="color: red;">Status: Occupied</p>
    </div>
  </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
